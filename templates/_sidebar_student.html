<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="hex hex-student"><i class="fa-solid fa-ticket"></i></div>
    <span>TicketClassify</span>
  </div>
  <div class="sidebar-section">Menu</div>
  <a href="{{ url_for('student.dashboard') }}"     class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="{{ url_for('student.submit_ticket') }}" class="nav-item"><i class="fa-solid fa-plus"></i> Submit Ticket</a>
  <a href="{{ url_for('student.notifications') }}" class="nav-item">
    <i class="fa-solid fa-bell"></i> Notifications
    {% if unread is defined and unread > 0 %}
      <span style="margin-left:auto;background:#ef4444;color:#fff;font-size:.68rem;padding:.1rem .45rem;border-radius:20px;font-weight:700">{{ unread }}</span>
    {% endif %}
  </a>
  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar avatar-student">{{ session.user_name[0]|upper }}</div>
      <div class="user-info">
        <div class="name">{{ session.user_name }}</div>
        <div class="role-tag">Student</div>
      </div>
    </div>
    <a href="{{ url_for('auth.logout') }}" class="btn btn-secondary btn-sm" style="width:100%;margin-top:.9rem;justify-content:center">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
  </div>
</aside>
