{% extends "base.html" %}
{% block title %}Submit Ticket – TicketClassify{% endblock %}
{% block body %}
<div class="app-layout">
  {% include "_sidebar_student.html" %}
  <main class="main-content">
    <div class="page-header"><h2>Submit a Ticket</h2><p>Describe your issue and we'll route it to the right team</p></div>
    <div class="form-card">
      <h3><i class="fa-solid fa-pen-to-square" style="color:var(--student);margin-right:.5rem"></i>New Support Ticket</h3>
      <form method="POST" enctype="multipart/form-data" novalidate>
        <div class="form-group">
          <label>Ticket Title *</label>
          <input type="text" name="title" placeholder="e.g. Broken light in corridor 3B" required maxlength="200">
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea name="description" placeholder="Provide as much detail as possible — location, time it started, severity…" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Urgency Level</label>
            <select name="urgency">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🟠 High</option>
              <option value="critical">🔴 Critical</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Attachment (optional)</label>
          <div class="upload-zone"><i class="fa-solid fa-cloud-arrow-up"></i><p>Drag & drop or <span>click to browse</span></p></div>
          <input type="file" id="attachment" name="attachment" style="display:none" accept=".png,.jpg,.jpeg,.gif,.pdf,.docx,.txt">
        </div>
        <div style="display:flex;gap:1rem;margin-top:.5rem">
          <button type="submit" class="btn btn-primary" style="width:auto;padding:.75rem 2rem"><i class="fa-solid fa-paper-plane"></i> Submit</button>
          <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
{% endblock %}
